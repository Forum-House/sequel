name: CI - Tests & Coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sequel_test
        options: >-
          --health-cmd "pg_isready -U postgres -d sequel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage
        working-directory: backend
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequel_test
          REDIS_URL: redis://localhost:6379
          BASE_URL: http://localhost
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=50
