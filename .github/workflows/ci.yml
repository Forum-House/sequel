name: CI - Tests & Coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: url_shortener_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests with coverage
        run: PYTHONPATH=. pytest backend/tests/ -v --cov=app --cov-report=term --cov-fail-under=50
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/url_shortener_test
          REDIS_URL: redis://localhost:6379
          BASE_URL: http://localhost
