name: CI - Tests & Coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: url_shortener_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests with coverage
        run: pytest backend/tests/ -v --cov=app --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/url_shortener_test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: url_shortener_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          BASE_URL: http://localhost
