events { worker_connections 1024; }

http {
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=url_cache:10m max_size=100m inactive=120m use_temp_path=off;

  upstream api_backend {
    server api1:8000;
    server api2:8000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;

      proxy_cache url_cache;
      proxy_cache_valid 200 301 302 60s;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_use_stale error timeout updating;
      proxy_cache_lock on;

      proxy_ignore_headers Cache-Control Expires Set-Cookie;
      proxy_hide_header Cache-Control;
      proxy_hide_header x-cache;
      proxy_hide_header x-cache-ttl;
      proxy_hide_header x-request-id;

      add_header x-cache $upstream_cache_status;
      add_header x-cache-ttl 60;
    }
  }
}
